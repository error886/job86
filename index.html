    <!-- Fix for sandbox/iframe environments where window.fetch is getter-only and throws on assignment -->
    <script>
      (function() {
        try {
          var currentFetch = window.fetch;
          var defineFetch = function(obj) {
            if (!obj) return;
            try {
              Object.defineProperty(obj, 'fetch', {
                get: function() {
                  return currentFetch;
                },
                set: function(val) {
                  currentFetch = val;
                },
                configurable: true,
                enumerable: true
              });
            } catch (err) {
              try {
                delete obj.fetch;
                obj.fetch = currentFetch;
              } catch (err2) {
                console.warn('Could not redefine fetch on target object:', err2);
              }
            }
          };
          defineFetch(window);
          defineFetch(self);
          if (typeof globalThis !== 'undefined') {
            defineFetch(globalThis);
          }
        } catch (e) {
          console.warn('Sandbox fetch override patch failed:', e);
        }
      })();
    </script>
